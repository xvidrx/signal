<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡Cyber Scanner M5 Smart</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{
background:
radial-gradient(circle at 15% 40%,rgba(42,76,210,.25),transparent 35%),
radial-gradient(circle at 85% 90%,rgba(115,0,255,.22),transparent 35%),
#030919;
}
.panel{
background:rgba(4,12,34,.86);
backdrop-filter:blur(8px);
border:1px solid rgba(80,120,255,.18);
box-shadow:0 0 40px rgba(20,70,255,.12);
}
.gridbg{
background-image:
linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
background-size:28px 28px;
}
.card{
background:#040b22;
border:1px solid rgba(72,104,255,.35);
box-shadow:0 0 20px rgba(0,50,255,.12);
}
</style>
</head>
<body class="text-white min-h-screen">

<header class="px-8 py-6 border-b border-white/5 flex justify-between items-center">
<div>
<div class="flex items-center gap-4">
<div class="w-3 h-3 rounded-full bg-emerald-400"></div>
<h1 class="font-black tracking-widest text-3xl">CYBER SCANNER</h1>
<span class="px-3 py-1 rounded-lg bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-xs">M5 SMART</span>
</div>
<p class="text-slate-500 text-sm mt-2">Фильтр топ-активов</p>
</div>
<div class="rounded-2xl border border-emerald-500/20 px-5 py-3 text-emerald-400 font-bold">ТАЙМФРЕЙМ: M5</div>
</header>

<div class="max-w-6xl mx-auto px-4 py-10">
<div class="panel gridbg rounded-[38px] p-8">
<div class="flex justify-between items-center mb-8">
<h2 class="font-bold text-3xl">ВХОД СТРОГО ПО УКАЗАНИЯМ СИГНАЛА</h2>
<div id="clock" class="text-cyan-400 font-bold"></div>
</div>
<div id="grid" class="grid md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
</div>
</div>

<script>
const ws = new WebSocket("ws://" + location.host + "/ws");

ws.onmessage=(event)=>{
document.getElementById("clock").innerText="Обновлено: "+new Date().toLocaleTimeString();
const data=JSON.parse(event.data);
const grid=document.getElementById("grid");
grid.innerHTML="";

data.forEach(signal=>{
const up = signal.direction==="ВВЕРХ";

grid.innerHTML += `
<div class="card rounded-[28px] p-6">
<div class="flex justify-between items-start mb-4">
<div>
<div class="text-4xl font-black">${signal.pair}</div>
<div class="text-emerald-400 text-sm mt-2">Доходность: ${signal.confidence}%</div>
</div>
<div class="px-3 py-1 rounded-lg border ${up?'text-emerald-400 border-emerald-500/30':'text-rose-400 border-rose-500/30'}">📡 СИГНАЛ</div>
</div>

<div class="bg-black/25 rounded-2xl p-4 space-y-3">
<div class="flex justify-between"><span class="text-slate-500">КУДА:</span><span class="${up?'text-emerald-400':'text-rose-400'} font-bold">${signal.direction}</span></div>
<div class="flex justify-between"><span class="text-slate-500">ВРЕМЯ ВХОДА:</span><span class="text-indigo-300 font-bold">${signal.entry_time}</span></div>
<div class="flex justify-between"><span class="text-slate-500">НА СКОЛЬКО:</span><span class="font-bold">${signal.expiration}</span></div>
</div>

<div class="mt-5 text-xs text-slate-500">${signal.entry_after}</div>
<div class="mt-2 text-right text-xs text-slate-400">Цена: ${signal.price}</div>
</div>`;
});
};
</script>
</body>
</html>
