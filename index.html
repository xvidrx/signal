<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Scanner PRO</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#020b24] text-white min-h-screen">

<div class="max-w-7xl mx-auto px-10 py-6">

<div class="flex justify-between items-start mb-10">

<div>
<h1 class="text-5xl font-black tracking-wide">
⚡ CYBER SCANNER PRO
</h1>

<p class="text-slate-400 mt-3 text-xl">
EMA + RSI анализ · AI фильтр · M5/M15
</p>
</div>

<div class="text-right">
<div class="text-emerald-400 font-black text-2xl">
ONLINE
</div>

<div id="clock" class="text-slate-400 mt-2"></div>
</div>

</div>

<div id="grid"
class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>

</div>

<script>

const ws = new WebSocket("ws://" + location.host + "/ws");

ws.onmessage = (event) => {

    document.getElementById("clock").innerText =
        new Date().toLocaleTimeString();

    const data = JSON.parse(event.data);

    const grid = document.getElementById("grid");

    grid.innerHTML = "";

    data.forEach(signal => {

        let isCall = signal.direction === "ВВЕРХ";

        let border = isCall
            ? "border-emerald-500"
            : "border-rose-500";

        let button = isCall
            ? "bg-emerald-500 text-black"
            : "bg-rose-500 text-black";

        grid.innerHTML += `
        <div class="
            bg-[#14001d]
            border ${border}
            rounded-[28px]
            p-7
        ">

            <div class="flex justify-between items-start">

                <div>
                    <div class="text-5xl font-black">
                        ${signal.pair}
                    </div>

                    <div class="text-slate-400 mt-3">
                        Точность: ${signal.confidence}%
                    </div>
                </div>

                <div class="
                    px-5 py-2 rounded-2xl font-black text-xl
                    ${button}
                ">
                    ${signal.direction}
                </div>

            </div>

            <div class="mt-10 space-y-5 text-2xl">

                <div class="flex justify-between">
                    <span class="text-slate-300">
                        M5 RSI
                    </span>

                    <span class="font-bold">
                        ${signal.rsi5}
                    </span>
                </div>

                <div class="flex justify-between">
                    <span class="text-slate-300">
                        M15 RSI
                    </span>

                    <span class="font-bold">
                        ${signal.rsi15}
                    </span>
                </div>

                <div class="flex justify-between">
                    <span class="text-slate-300">
                        Заходить в
                    </span>

                    <span class="font-bold text-yellow-300">
                        ${signal.entry_time}
                    </span>
                </div>

                <div class="flex justify-between">
                    <span class="text-slate-300">
                        Экспирация
                    </span>

                    <span class="font-bold">
                        ${signal.expiration}
                    </span>
                </div>

                <div class="flex justify-between">
                    <span class="text-slate-300">
                        Цена
                    </span>

                    <span class="font-bold">
                        ${signal.price}
                    </span>
                </div>

            </div>

            <div class="
                mt-8
                bg-black/20
                rounded-2xl
                p-4
                text-slate-300
            ">
                ${signal.entry_after}
            </div>

        </div>
        `;
    });
};
</script>

</body>
</html>
